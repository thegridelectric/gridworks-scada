per_listener_settings true

#################################
# Non-TLS, 'clear' MQTT on port 1883 for SCADA <-> LTN
listener 1883 0.0.0.0
allow_anonymous true

#################################
# Non-TLS, 'clear' MQTT on port 18831 for SCADA <-> SCADA2
listener 18831 0.0.0.0
allow_anonymous true

#################################
# Logging in case something goes wrong locally.
log_dest stderr
log_type all
